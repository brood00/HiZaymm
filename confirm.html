<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="reset.css">
    <link rel="stylesheet" href="confirm.css">
    <link rel="stylesheet" href="contact.css">
    <title>Заявка успешно отправлена!</title>
</head>

<body>
    <header class="header">
        <div class="container">
            <div class="header__wrapper">
                <div class="logo__wrapper">
                    <a href="main.html"><img src="images/logo.svg" alt=""></a>
                    <a href="main.html" class="text__logo">Hi Client</a>
                </div>

                <div class="burger-contact" id="burger-menu-contact">
                    <div class="burger__menu-wrapper-contact">
                        <img src="images/burger.svg" alt="Открыть меню" class="burger__icon-open-contact">
                    </div>
                    <img src="images/close.svg" alt="Закрыть меню" class="burger__icon-close-contact">
                </div>

                <nav class="menu">
                    <a href="#" class="menu__link">Заявка на подключение</a>
                </nav>
                <nav class="menu__mobile-contact">
                    <a href="#" class="menu__link menu__link-account"><img src="images/account-logo-mobile.svg"
                            alt="">Личный кабинет</a>
                    <a href="#" class="menu__link menu__link-phone"><img src="images/phone-logo-mobile.svg" alt=""><span
                            class="text-opacity">+7(3952)</span> 66 22 45</a>
                </nav>
                <div class="contact__header-wrapper">
                    <div class="phone__wrapper">
                        <img src="images/phone-call.svg" alt="">
                        <a href="#" class="phone__link"><span class="text-opacity">+7(3952)</span> 66 22
                            45</a>
                    </div>
                    <div class="account__wrapper">
                        <img src="images//account.svg" alt="">
                        <a href="#" class="account__link">Личный кабинет</a>
                    </div>
                </div>
            </div>
            <a href="#" class="menu__link menu__link-mobile">Заявка на подключение</a>

        </div>
    </header>

    <main class="main">
        <section class="welcome__confirm">
            <div class="shadow__line-welcome"></div>
            <div class="container">
                <div class="welcome__content-top">
                    <div class="box-step__welcome box-step__welcome-confirm">
                        <img class="step__confirm-img" src="images/logo-confirm.svg" alt="">
                        <p class="text-step__mobile">1</p>
                        <p class="text-step text-step-confirm">Контактная информация:</p>
                    </div>
                </div>

                <div class="welcome__content-confirm">
                    <div class="wrapper__cards-confirm">
                        <div class="card__confirm card__confirm-green">
                            <h2 class="title__card-confirm">Ваша заявка принята на рассмотрение!</h2>
                            <p class="subtitle__card-confirm">Спасибо, что выбрали нас</p>
                            <img src="images/card-confirm-1.png" alt="">
                        </div>
                        <div class="card__confirm card__confirm-light-green">
                            <h2 class="title__card-confirm">Мы свяжемся с вами в течении 20 мин.</h2>
                            <p class="subtitle__card-confirm">Тел: +7(3952) 60-22-45</p>
                            <img class="card__confirm-img" src="images/card-confirm-2.png" alt="">
                        </div>
                    </div>
                </div>

            </div>
        </section>
    </main>

</body>

<script src="confirm.js"></script>

</html>
